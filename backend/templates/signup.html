<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — SmartPicks</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #00c6ff; --brand-dark: #0072ff; --text: #ffffff; --text-muted: rgba(255,255,255,0.6); --border: rgba(255,255,255,0.15); --input-bg: rgba(255,255,255,0.08); --card-bg: rgba(255,255,255,0.07); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #040d1a; overflow-x: hidden; position: relative; padding: 20px 0; }
        .bg-blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.4; pointer-events: none; z-index: 0; }
        .bg-blob-1 { width: 500px; height: 500px; background: radial-gradient(circle, #0072ff, transparent); top: -100px; left: -100px; }
        .bg-blob-2 { width: 400px; height: 400px; background: radial-gradient(circle, #00c6ff, transparent); bottom: -80px; right: -80px; }
        body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,198,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,198,255,0.03) 1px, transparent 1px); background-size: 40px 40px; z-index: 0; pointer-events: none; }
        .auth-wrapper { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 20px; }
        .auth-logo { text-align: center; margin-bottom: 28px; }
        .logo-emoji { font-size: 52px; display: block; margin-bottom: 10px; }
        .auth-logo h1 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: #fff; }
        .auth-logo h1 span { color: var(--brand); }
        .auth-logo p { font-size: 12px; color: var(--text-muted); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }
        .auth-card { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 32px 28px; box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1); }
        .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; gap: 4px; }
        .tab { flex: 1; text-align: center; padding: 10px 4px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-muted); text-decoration: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; white-space: nowrap; }
        .tab.active { color: var(--brand); border-bottom-color: var(--brand); }
        .tab:hover:not(.active) { color: rgba(255,255,255,0.8); }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
        .input-wrap { position: relative; }
        input { width: 100%; padding: 13px 16px; background: var(--input-bg); border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; font-family: 'DM Sans', sans-serif; color: #fff; outline: none; transition: all 0.2s; }
        input::placeholder { color: rgba(255,255,255,0.3); }
        input:focus { border-color: var(--brand); background: rgba(0,198,255,0.08); box-shadow: 0 0 0 3px rgba(0,198,255,0.15); }
        .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; color: rgba(255,255,255,0.35); }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #0072ff, #00c6ff); color: white; font-size: 15px; font-weight: 700; font-family: 'Syne', sans-serif; cursor: pointer; transition: all 0.2s; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 20px rgba(0,114,255,0.4); }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(0,198,255,0.5); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
        .btn.loading .btn-spinner { display: inline-block; }
        .alert-error { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.4); color: #ff8a80; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .alert-success { background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.4); color: #4ade80; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        footer { text-align: center; font-size: 12px; color: rgba(255,255,255,0.2); margin-top: 20px; position: relative; z-index: 1; }
    </style>
</head>
<body>
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="auth-wrapper">
    <div class="auth-logo">
        <span class="logo-emoji">🛒</span>
        <h1>Smart<span>Picks</span></h1>
        <p>by Natts Digital</p>
    </div>
    <div class="auth-card">
        <div class="tabs">
            <a href="/login" class="tab">🔐 Login</a>
            <a href="/signup" class="tab active">📝 Sign Up</a>
            <a href="/forgot" class="tab">🔑 Forgot</a>
        </div>
        {% if error %}<div class="alert-error">{{ error }}</div>{% endif %}
        {% if success %}<div class="alert-success">{{ success }} <a href="/login" style="color:var(--brand)">Login here</a></div>{% endif %}
        <form method="POST" id="signupForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <input type="password" name="password" id="pw1" placeholder="Min 6 characters" required>
                    <button type="button" class="toggle-pw" onclick="togglePw('pw1',this)">👁</button>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-wrap">
                    <input type="password" name="confirm" id="pw2" placeholder="Repeat password" required>
                    <button type="button" class="toggle-pw" onclick="togglePw('pw2',this)">👁</button>
                </div>
            </div>
            <button type="submit" class="btn" id="signupBtn">
                <div class="btn-spinner"></div>
                <span class="btn-text">📝 Create Account</span>
            </button>
        </form>
    </div>
</div>
<footer>© 2026 Natts Digital. All rights reserved.</footer>
<script>
function togglePw(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
    else { input.type = 'password'; btn.textContent = '👁'; }
}
document.getElementById('signupForm').addEventListener('submit', function() {
    const btn = document.getElementById('signupBtn');
    btn.classList.add('loading');
    btn.querySelector('.btn-text').textContent = 'Creating account...';
    btn.disabled = true;
    setTimeout(() => { btn.classList.remove('loading'); btn.querySelector('.btn-text').textContent = '📝 Create Account'; btn.disabled = false; }, 8000);
});
</script>
</body>
</html>
