<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — SmartPicks</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #00c6ff; --brand-dark: #0072ff; --text: #ffffff; --text-muted: rgba(255,255,255,0.6); --border: rgba(255,255,255,0.15); --input-bg: rgba(255,255,255,0.08); --card-bg: rgba(255,255,255,0.07); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #040d1a; overflow: hidden; position: relative; }
        .bg-blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.5; animation: floatBlob 8s ease-in-out infinite alternate; pointer-events: none; z-index: 0; }
        .bg-blob-1 { width: 500px; height: 500px; background: radial-gradient(circle, #0072ff, transparent); top: -100px; left: -100px; }
        .bg-blob-2 { width: 400px; height: 400px; background: radial-gradient(circle, #00c6ff, transparent); bottom: -80px; right: -80px; animation-delay: 3s; }
        .bg-blob-3 { width: 300px; height: 300px; background: radial-gradient(circle, #00e5ff, transparent); top: 40%; left: 50%; transform: translate(-50%,-50%); animation-delay: 1.5s; }
        @keyframes floatBlob { from { transform: scale(1) translate(0,0); } to { transform: scale(1.15) translate(20px,20px); } }
        body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,198,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,198,255,0.04) 1px, transparent 1px); background-size: 40px 40px; z-index: 0; pointer-events: none; }
        .auth-wrapper { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 20px; }
        .auth-logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { width: 96px; height: 96px; border-radius: 22px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 14px; background: linear-gradient(135deg, #0072ff, #00c6ff); box-shadow: 0 0 32px rgba(0,198,255,0.4); animation: pulseLogo 3s ease-in-out infinite; font-size: 48px; }
        @keyframes pulseLogo { 0%,100% { box-shadow: 0 0 20px rgba(0,114,255,0.5), 0 0 40px rgba(0,198,255,0.3); } 50% { box-shadow: 0 0 40px rgba(0,114,255,0.8), 0 0 70px rgba(0,198,255,0.5); } }
        .auth-logo h1 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: #fff; }
        .auth-logo h1 span { color: var(--brand); }
        .auth-logo p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .auth-card { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 32px 28px; box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1); }
        .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; gap: 4px; }
        .tab { flex: 1; text-align: center; padding: 10px 4px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-muted); text-decoration: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; white-space: nowrap; }
        .tab.active { color: var(--brand); border-bottom-color: var(--brand); }
        .tab:hover:not(.active) { color: rgba(255,255,255,0.8); }
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px 16px; background: var(--input-bg); border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; font-family: 'DM Sans', sans-serif; color: #fff; outline: none; transition: all 0.2s; }
        input::placeholder { color: rgba(255,255,255,0.3); }
        input:focus { border-color: var(--brand); background: rgba(0,198,255,0.08); box-shadow: 0 0 0 3px rgba(0,198,255,0.15); }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #0072ff, #00c6ff); color: white; font-size: 15px; font-weight: 700; font-family: 'Syne', sans-serif; cursor: pointer; transition: all 0.2s; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 20px rgba(0,114,255,0.4); }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(0,198,255,0.5); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
        .btn.loading .btn-spinner { display: inline-block; }
        .alert-error { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.4); color: #ff8a80; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .alert-success { background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.4); color: #4ade80; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .trial-badge { background: rgba(0,198,255,0.1); border: 1px solid rgba(0,198,255,0.25); border-radius: 10px; padding: 10px 14px; font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 16px; text-align: center; }
        .trial-badge strong { color: var(--brand); }
        .promo-toggle { text-align: center; margin-bottom: 10px; }
        .promo-toggle a { font-size: 12px; color: rgba(0,198,255,0.7); text-decoration: none; }
        .promo-section { display: none; margin-bottom: 14px; }
        .natts-panel { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 16px 0 8px; }
        .natts-copy { font-size: 11px; color: rgba(255,255,255,0.2); }

        @media (max-width: 480px) {
            body { padding: 0; justify-content: flex-start; align-items: stretch; height: 100vh; height: 100dvh; overflow: hidden; }
            .auth-wrapper { max-width: 100%; padding: 0; height: 100vh; height: 100dvh; display: flex; flex-direction: column; }
            .auth-logo { flex-shrink: 0; background: #040d1a; padding: 20px 24px 16px; margin-bottom: 0; border-bottom: 1px solid rgba(0,198,255,0.12); }
            .logo-icon { width: 64px; height: 64px; font-size: 32px; }
            .auth-logo h1 { font-size: 22px; }
            .auth-card { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; border-radius: 0; border-left: none; border-right: none; border-top: none; padding: 20px 20px 16px; min-height: 0; }
            .natts-panel { flex-shrink: 0; background: #040d1a; padding: 10px 0 16px; }
        }
    </style>
</head>
<body>
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="bg-blob bg-blob-3"></div>

<div class="auth-wrapper">
    <div class="auth-logo">
        <div class="logo-icon">🛒</div>
        <h1>Smart<span>Picks</span></h1>
        <p>Australia's weekly specials, sorted</p>
    </div>
    <div class="auth-card">
        <div class="tabs">
            <a href="/login" class="tab">🔐 Login</a>
            <a href="/signup" class="tab active">📝 Sign Up</a>
            <a href="/forgot" class="tab">🔑 Forgot</a>
        </div>

        {% if error %}<div class="alert-error">❌ {{ error }}</div>{% endif %}
        {% if success %}<div class="alert-success">✅ {{ success }} <a href="/login" style="color:var(--brand);">Login here →</a></div>{% endif %}

        <div class="trial-badge">🎉 Start your <strong>14-day free trial</strong> — no credit card required</div>

        <form method="POST" id="signupForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Your full name" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@email.com" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min 6 characters" autocomplete="new-password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm" placeholder="Repeat password" autocomplete="new-password" required>
            </div>
            <div class="promo-toggle">
                <a href="#" onclick="togglePromo(event)">🎟️ Have a promo code?</a>
            </div>
            <div class="promo-section" id="promoSection">
                <div class="form-group">
                    <label>Promo Code</label>
                    <input type="text" name="promo_code" id="promoInput" placeholder="Enter promo code" style="text-transform:uppercase;" autocomplete="off">
                    <div id="promoMsg" style="font-size:12px;margin-top:6px;display:none;"></div>
                </div>
            </div>
            <button type="submit" class="btn" id="signupBtn">
                <div class="btn-spinner"></div>
                <span>📝 Create Account</span>
            </button>
        </form>
    </div>
    <div class="natts-panel">
        <div class="natts-copy">© 2026 Natts Digital. All rights reserved.</div>
    </div>
</div>
<script>
function togglePromo(e) {
    e.preventDefault();
    const s = document.getElementById('promoSection');
    s.style.display = s.style.display === 'block' ? 'none' : 'block';
}
document.getElementById('promoInput')?.addEventListener('blur', async function() {
    const code = this.value.trim().toUpperCase();
    const msg = document.getElementById('promoMsg');
    if (!code) { msg.style.display = 'none'; return; }
    try {
        const res = await fetch(`/validate_promo?code=${code}`);
        const data = await res.json();
        msg.style.display = 'block';
        msg.style.color = data.valid ? '#4ade80' : '#ff8a80';
        msg.textContent = data.valid ? `✅ ${data.message}` : `❌ ${data.message}`;
    } catch { msg.style.display = 'none'; }
});
document.getElementById('signupForm').addEventListener('submit', function() {
    document.getElementById('signupBtn').classList.add('loading');
});
</script>
</body>
</html>
